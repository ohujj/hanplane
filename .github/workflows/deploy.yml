name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: JDK 21 설정
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 빌드
        run: |
          cd hanplane
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: EC2 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            pkill -f hanplane || true
            cd /home/ec2-user
            rm -f hanplane.jar

      - name: jar 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          source: "hanplane/build/libs/*.jar"
          target: "/home/ec2-user"
          strip_components: 3

      - name: 서버 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            nohup java -jar /home/ec2-user/hanplane.jar \
              --spring.profiles.active=prod > /home/ec2-user/app.log 2>&1 &